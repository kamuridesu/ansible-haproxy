name: deploy
on:
  - push
  - workflow_dispatch
jobs:
  deploy:
    name: Push changes
    runs-on: ubuntu-latest
    env:
      BACKEND_SRC: "${{ secrets.BACKEND_SRC }}"
      BACKEND_PORT: "${{ secrets.BACKEND_PORT }}"
      HAPROXY_STATS_USER: "${{ secrets.HAPROXY_STATS_USER }}"
      HAPROXY_STATS_PASS: "${{ secrets.HAPROXY_STATS_PASS }}"
      SSL_CERTIFICATE_FILE: "${{ secrets.SSL_CERTIFICATE_FILE }}"
      PROXY_PORT: "${{ secrets.PROXY_PORT }}"
      PROXY_HOST: "${{ secrets.PROXY_HOST }}"
      DATABASE_HOST: "${{ secrets.DATABASE_HOST }}"
      DATABASE_PORT: "${{ secrets.DATABASE_PORT }}"

    steps:
      - uses: actions/checkout@v4

      - name: Run playbook
        uses: dawidd6/action-ansible-playbook@v7
        with:
          playbook: playbook.yml
          directory: ./
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          inventory: |
            ${{ secrets.INVENTORY }}

          configuration: |
            [defaults]
            callbacks_enabled = ansible.posix.profile_tasks, ansible.posix.timer
            stdout_callback = yaml
            host_key_checking = False
            nocows = true

          options: |
            --verbose
